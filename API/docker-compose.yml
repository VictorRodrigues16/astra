# docker-compose da Astra API (versão corrigida / hardened, uso local).
# Os segredos NÃO ficam aqui: o app lê NASA_API_KEY do ambiente (.env local,
# fora do versionamento). Sem chave definida, usa DEMO_KEY da NASA.
services:
  astra-api:
    build: .
    container_name: astra-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Para usar sua chave real da NASA, defina NASA_API_KEY no .env (mesma
      # pasta) e descomente a linha abaixo:
      # - NASA_API_KEY=${NASA_API_KEY}
    restart: unless-stopped
